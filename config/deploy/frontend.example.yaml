apiVersion: v1
kind: List
objects:
  - apiVersion: console.redhat.com/v1
    kind: ConsoleFrontend
    metadata:
      name: insights
    spec:
      feoConfigEnabled: true

      module:
        manifestLocation: /apps/insights/fed-mods.json
        defaultDocumentTitle: "Insights"

      frontend:
        paths:
          - /apps/insights

      navigationSegments:
        - segmentId: local-nav-segment
          navItems:
            - id: local-dashboard
              title: "FEO MERGE TEST"
              href: "/local"
              description: "Local navigation item"

      bundleSegments:
        - segmentId: local-bundle-segment
          bundleId: insights
          position: 999
          navItems:
            - id: local-bundle-item
              title: "Local Bundle Item"
              href: "/local/bundle"

      searchEntries:
        - id: local-search-entry
          title: "Local Search"
          bundleTitle: "Insights"
          description: "Local search entry"
          href: "/local/search"
          frontendRef: insights

      serviceTiles:
        - section: insights
          group: featured
          id: local-service-tile
          title: "Local Service"
          description: "Local service tile"
          frontendRef: insights

      widgetRegistry:
        - scope: insights-local
          module: "./LocalWidget"
          frontendRef: insights
